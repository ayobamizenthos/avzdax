<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="neuralGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00FF41;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#primusGradient)"/>

  <!-- Neural network pattern -->
  <g opacity="0.1">
    <circle cx="300" cy="300" r="4" fill="#00FF41"/>
    <circle cx="600" cy="250" r="3" fill="#00FF41"/>
    <circle cx="900" cy="350" r="4" fill="#00FF41"/>
    <circle cx="1200" cy="280" r="3" fill="#00FF41"/>
    <circle cx="1500" cy="400" r="4" fill="#00FF41"/>

    <!-- Connection lines -->
    <path d="M300,300 Q450,275 600,250" stroke="#00FF41" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M600,250 Q750,300 900,350" stroke="#00FF41" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M900,350 Q1050,315 1200,280" stroke="#00FF41" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M1200,280 Q1350,340 1500,400" stroke="#00FF41" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- PRIMUS Text -->
  <text x="960" y="500" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="120" font-weight="900" opacity="0.3">
    PRIMUS
  </text>

  <!-- Tagline -->
  <text x="960" y="580" text-anchor="middle" fill="#a1a1a1" font-family="Inter, sans-serif" font-size="24" font-weight="400" opacity="0.6">
    NEURAL INTELLIGENCE NUCLEUS
  </text>

  <!-- Processing indicator -->
  <circle cx="960" cy="650" r="20" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="20;25;20" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>