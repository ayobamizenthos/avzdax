<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="visionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00FF41;stop-opacity:0" />
    </stop>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#visionGradient)"/>

  <!-- Grid overlay -->
  <g opacity="0.1" stroke="#00FF41" stroke-width="0.5">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- Central eye/targeting system -->
  <circle cx="400" cy="300" r="80" fill="url(#eyeGlow)" opacity="0.3"/>
  <circle cx="400" cy="300" r="40" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.6">
    <animate attributeName="r" values="40;50;40" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner brackets -->
  <g stroke="#00FF41" stroke-width="2" opacity="0.5">
    <line x1="50" y1="50" x2="100" y2="50"/>
    <line x1="50" y1="50" x2="50" y2="100"/>
    <line x1="700" y1="50" x2="750" y2="50"/>
    <line x1="750" y1="50" x2="750" y2="100"/>
    <line x1="50" y1="500" x2="100" y2="500"/>
    <line x1="50" y1="550" x2="50" y2="500"/>
    <line x1="700" y1="550" x2="750" y2="550"/>
    <line x1="750" y1="500" x2="750" y2="550"/>
  </g>

  <!-- Text -->
  <text x="400" y="380" text-anchor="middle" fill="#00FF41" font-family="monospace" font-size="16" opacity="0.8">
    VISUAL INTELLIGENCE
  </text>
  <text x="400" y="400" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="12" opacity="0.6">
    TARGET ACQUIRED • 0.4MS RESPONSE
  </text>
</svg>