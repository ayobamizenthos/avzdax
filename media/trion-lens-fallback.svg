<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#lensGradient)"/>

  <!-- Lens visualization -->
  <circle cx="400" cy="300" r="150" fill="url(#lensGlow)" opacity="0.2"/>
  <circle cx="400" cy="300" r="100" fill="none" stroke="#06B6D4" stroke-width="3" opacity="0.6"/>
  <circle cx="400" cy="300" r="60" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.8"/>
  <circle cx="400" cy="300" r="30" fill="#06B6D4" opacity="0.4"/>

  <!-- Optical lines -->
  <g stroke="#06B6D4" stroke-width="1" opacity="0.5">
    <line x1="250" y1="300" x2="550" y2="300"/>
    <line x1="400" y1="150" x2="400" y2="450"/>
    <line x1="320" y1="220" x2="480" y2="380"/>
    <line x1="480" y1="220" x2="320" y2="380"/>
  </g>

  <!-- Data points -->
  <circle cx="300" cy="250" r="4" fill="#06B6D4" opacity="0.8"/>
  <circle cx="500" cy="350" r="4" fill="#06B6D4" opacity="0.8"/>
  <circle cx="350" cy="400" r="4" fill="#06B6D4" opacity="0.8"/>
  <circle cx="450" cy="200" r="4" fill="#06B6D4" opacity="0.8"/>

  <!-- Text -->
  <text x="400" y="520" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="16" opacity="0.8">
    OPTICAL LENS
  </text>
  <text x="400" y="540" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="12" opacity="0.6">
    TITANIUM-EDGE COMPUTE
  </text>
</svg>