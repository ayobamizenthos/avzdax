<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="teletraanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="commandGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#teletraanGradient)"/>

  <!-- Command interface grid -->
  <g opacity="0.1" stroke="#3B82F6" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>

  <!-- Central command sphere -->
  <circle cx="960" cy="540" r="150" fill="url(#commandGlow)" opacity="0.4"/>
  <circle cx="960" cy="540" r="80" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.7"/>
  <circle cx="960" cy="540" r="40" fill="#3B82F6" opacity="0.5"/>

  <!-- Data streams -->
  <g stroke="#3B82F6" stroke-width="2" opacity="0.6">
    <path d="M960,390 Q880,315 800,390" fill="none"/>
    <path d="M960,690 Q1040,765 1120,690" fill="none"/>
    <path d="M810,540 Q735,460 810,380" fill="none"/>
    <path d="M1110,540 Q1185,620 1110,700" fill="none"/>
  </g>

  <!-- TELETRAAN Text -->
  <text x="960" y="500" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="120" font-weight="900" opacity="0.3">
    TELETRAAN
  </text>

  <!-- Tagline -->
  <text x="960" y="580" text-anchor="middle" fill="#a1a1a1" font-family="Inter, sans-serif" font-size="24" font-weight="400" opacity="0.6">
    GLOBAL COMMAND UI
  </text>

  <!-- Status indicator -->
  <circle cx="960" cy="650" r="20" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="20;25;20" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>