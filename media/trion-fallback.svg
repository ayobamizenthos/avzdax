<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="opticalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#trionGradient)"/>

  <!-- Optical sensor pattern -->
  <g opacity="0.1">
    <circle cx="960" cy="540" r="200" fill="url(#opticalGlow)"/>
    <circle cx="960" cy="540" r="100" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.5"/>
    <circle cx="960" cy="540" r="50" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- TRION Text -->
  <text x="960" y="500" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="120" font-weight="900" opacity="0.3">
    TRION
  </text>

  <!-- Tagline -->
  <text x="960" y="580" text-anchor="middle" fill="#a1a1a1" font-family="Inter, sans-serif" font-size="24" font-weight="400" opacity="0.6">
    OPTICAL VANGUARD
  </text>

  <!-- Sensor indicator -->
  <circle cx="960" cy="650" r="20" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="20;25;20" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>